<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Math Collective</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(124,58,237,0.2), transparent),
        var(--bg);
    }

    .error-code {
      font-family: 'Space Mono', monospace;
      font-size: clamp(5rem, 20vw, 12rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple-light), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .error-sub {
      color: var(--text-2);
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .error-math {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-3);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 99px;
      margin-bottom: 2.5rem;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-sub">This page doesn't exist — much like a solution to P=NP. Let's get you back on track.</p>
  <div class="error-math">undefined ≠ found</div>

  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
    <a href="/" class="btn btn-primary btn-lg">← Return Home</a>
    <a href="/arena" class="btn btn-ghost btn-lg">Enter the Arena</a>
  </div>

</body>
</html>
